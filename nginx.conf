upstream nodejs {
    server 127.0.0.1:3081;
}

server {
    server_name art.alanhurtarte.com;

    root /var/www/art-portfolio;
    index index.html;

    # Proxy API requests to Node.js
    location /api/ {
        proxy_pass         http://nodejs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Proxy admin panel to Node.js
    location /admin {
        proxy_pass         http://nodejs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Serve uploaded images directly (bypass Node for performance)
    location /uploads/ {
        alias   /var/www/art-portfolio/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Static site files
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|jpg|jpeg|png|webp|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/art.alanhurtarte.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/art.alanhurtarte.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = art.alanhurtarte.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name art.alanhurtarte.com;
    return 404; # managed by Certbot
}
